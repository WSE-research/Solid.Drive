name: User Story
description: Create a structured user story
labels: ["user-story"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## User Story

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the user story in the format below.
      placeholder: |
        As a [role]
        I want to [feature / goal]
        So that [benefit / reason].
    validations:
      required: true

  - type: textarea
    id: additional_information
    attributes:
      label: Additional Information
      description: Add screenshots, links, dependencies, or open questions.
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List clear, testable requirements.
      placeholder: |
        - [ ] Requirement 1
        - [ ] Requirement 2
    validations:
      required: true

  - type: textarea
    id: definition_of_ready
    attributes:
      label: Definition of Ready (DoR)
      value: |
        - [ ] Independent
        - [ ] Negotiable
        - [ ] Valuable
        - [ ] Estimable
        - [ ] Small
        - [ ] Testable
    validations:
      required: true

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done (DoD)
      value: |
        - [ ] Acceptance criteria are met
        - [ ] Meaningful tests are implemented
        - [ ] Validation checks pass successfully
        - [ ] Documentation updated
        - [ ] Code review completed
    validations:
      required: true
