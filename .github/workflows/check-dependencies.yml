name: Check dependencies

on:
  push:
  pull_request:

jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # @solid/community-server is launched via `npx community-solid-server`
      # in playwright.config.ts (not imported), so depcheck can't see it.
      # @radix-ui/react-{dialog,popover,tabs} are pre-installed for the
      # OneDrive-layout follow-up tickets (detail panel, settings popover,
      # shared tabs) — they will be wired up next milestone. Tree-shaking
      # excludes them from production until then.
      - run: npx depcheck --ignores="@types/*,eslint-*,globals,vitest,@vitejs/*,typescript,typescript-eslint,vite,@ldo/solid,@ldo/connected-solid,buffer,shexj,@vitest/coverage-v8,@testing-library/user-event,uuid,tsx,@solid/community-server,@radix-ui/react-dialog,@radix-ui/react-popover,@radix-ui/react-tabs,virtual:pwa-register" --ignore-dirs="dist,node_modules"
