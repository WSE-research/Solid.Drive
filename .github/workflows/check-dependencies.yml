name: Check dependencies

on:
  push:
  pull_request:

jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # @solid/community-server is launched via `npx community-solid-server`
      # in playwright.config.ts (not imported), so depcheck can't see it.
      - run: npx depcheck --ignores="@types/*,eslint-*,globals,vitest,@vitejs/*,typescript,typescript-eslint,vite,@ldo/solid,@ldo/connected-solid,buffer,shexj,@vitest/coverage-v8,@testing-library/user-event,uuid,tsx,@solid/community-server" --ignore-dirs="dist,node_modules"
