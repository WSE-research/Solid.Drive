server {
    listen 80;
    server_name _;

    # The upstream reverse proxy terminates TLS and forwards requests with the
    # /solid-hello-world-frontend-react path prefix intact. Emit relative
    # redirects so nginx never drops the client back to http:// or to the
    # internal port.
    absolute_redirect off;
    port_in_redirect off;
    server_tokens off;

    # Normalize the bare prefix to the trailing-slash form so the SPA's
    # relative asset URLs resolve correctly.
    location = /solid-hello-world-frontend-react {
        return 301 /solid-hello-world-frontend-react/;
    }

    location /solid-hello-world-frontend-react/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /solid-hello-world-frontend-react/index.html;

        # Long-cache hashed build assets
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
