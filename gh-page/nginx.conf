server {
    listen 80;
    server_name _;

    # The WSE reverse proxy terminates TLS and forwards requests with the
    # /Solid.Drive path prefix intact (https://wse-research.org/Solid.Drive).
    # Keep redirects relative so nginx never drops the client to http:// or
    # the internal port.
    absolute_redirect off;
    port_in_redirect off;
    server_tokens off;

    # Convenience for direct/container access: send the root to the prefix.
    location = / {
        return 302 /Solid.Drive/;
    }

    # Normalise the bare prefix to the trailing-slash form so the page's
    # relative asset URLs (assets/...) resolve under /Solid.Drive/.
    location = /Solid.Drive {
        return 301 /Solid.Drive/;
    }

    # Serve the built site (which lives at the image root) under the prefix.
    location /Solid.Drive/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /Solid.Drive/index.html;
    }
}
