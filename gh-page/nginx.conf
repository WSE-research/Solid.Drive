server {
    listen 80;
    server_name _;

    absolute_redirect off;
    port_in_redirect off;
    server_tokens off;

    # Served behind the WSE reverse proxy at
    # https://wse-research.org/Solid.Drive. That route forwards the request
    # with the /Solid.Drive prefix *stripped* (the container sees /...), so
    # we serve from the site root and never issue a prefix redirect (a
    # prefix + strip redirect loops). index.html carries
    # <base href="/Solid.Drive/"> so the page's relative asset URLs always
    # resolve under the public prefix regardless of a trailing slash.

    # If the prefix is ever forwarded intact, map it onto the site root too.
    location /Solid.Drive/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /Solid.Drive/index.html;
    }

    # Prefix stripped (the normal case) or direct access: serve from root.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
